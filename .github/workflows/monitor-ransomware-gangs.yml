name: Monitor ransomware gang additions

on:
  # Run four times per hour.
  # GitHub Actions schedules use UTC and may occasionally be delayed.
  schedule:
    - cron: "7,22,37,52 * * * *"

  # Also permit manual runs from the GitHub Actions page.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deepdarkcti-upstream-monitor
  cancel-in-progress: false

jobs:
  monitor:
    name: Check deepdarkCTI for ransomware gang additions
    runs-on: ubuntu-latest

    env:
      UPSTREAM_REPOSITORY: fastfire/deepdarkCTI
      TRACKED_FILE: ransomware_gang.md
      FORK_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      # Complete Git history is required to identify the merge base and inspect
      # individual upstream commits.
      - name: Check out fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure and fetch upstream repository
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          UPSTREAM_BRANCH="$(
            gh api "repos/${UPSTREAM_REPOSITORY}" \
              --jq '.default_branch'
          )"

          if [ -z "$UPSTREAM_BRANCH" ]; then
            echo "::error::Unable to determine the upstream default branch."
            exit 1
          fi

          # Make the upstream branch available to all following steps.
          echo "UPSTREAM_BRANCH=$UPSTREAM_BRANCH" >> "$GITHUB_ENV"

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url \
              upstream \
              "https://github.com/${UPSTREAM_REPOSITORY}.git"
          else
            git remote add \
              upstream \
              "https://github.com/${UPSTREAM_REPOSITORY}.git"
          fi

          git fetch --no-tags upstream "$UPSTREAM_BRANCH"

          echo "Fork repository: ${GITHUB_REPOSITORY}"
          echo "Fork branch: ${FORK_BRANCH}"
          echo "Upstream repository: ${UPSTREAM_REPOSITORY}"
          echo "Upstream branch: ${UPSTREAM_BRANCH}"
          echo "Fork SHA: $(git rev-parse HEAD)"
          echo "Upstream SHA: $(git rev-parse "upstream/${UPSTREAM_BRANCH}")"

      - name: Detect ransomware addition commits
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          UPSTREAM_REF="upstream/${UPSTREAM_BRANCH}"
          MATCH_FILE="$RUNNER_TEMP/matching-commits.txt"

          # Create an empty file to hold matching commit details.
          : > "$MATCH_FILE"

          if ! BASE_SHA="$(git merge-base HEAD "$UPSTREAM_REF")"; then
            echo "::error::Unable to determine the shared Git history."
            exit 1
          fi

          MATCH_COUNT=0
          CHECKED_COUNT=0

          # Match the complete words:
          #
          #   add
          #   added
          #   new
          #
          # Matching is case-insensitive, and the keyword can appear anywhere
          # in the commit subject.
          #
          # Examples that match:
          #   Add D1R ransomware data leak site
          #   add D1R ransomware data leak site
          #   D1R ransomware data leak site added
          #   Added Example ransomware group
          #   New ransomware operation
          #   Update list - new Example group
          #
          # Examples that do not match:
          #   Address formatting problem
          #   Additional corrections
          #   Renew documentation
          KEYWORD_REGEX='(^|[^[:alnum:]_])(add(ed)?|new)([^[:alnum:]_]|$)'

          echo "Checking upstream commit range:"
          echo "${BASE_SHA}..${UPSTREAM_REF}"
          echo
          echo "Tracked file: ${TRACKED_FILE}"
          echo "Keywords: add, added, new"
          echo "Keyword matching: case-insensitive"

          # git rev-list is restricted to commits that modified the tracked file.
          while IFS= read -r COMMIT_SHA; do
            [ -n "$COMMIT_SHA" ] || continue

            CHECKED_COUNT=$((CHECKED_COUNT + 1))

            SUBJECT="$(git log -1 --format='%s' "$COMMIT_SHA")"
            SHORT_SHA="$(git rev-parse --short "$COMMIT_SHA")"
            AUTHOR="$(git log -1 --format='%an' "$COMMIT_SHA")"

            COMMIT_DATE="$(
              git log -1 \
                --format='%ad' \
                --date='format:%d %b %Y %H:%M UTC' \
                "$COMMIT_SHA"
            )"

            echo "Checking ${SHORT_SHA}: ${SUBJECT}"

            if printf '%s\n' "$SUBJECT" |
              grep -Eiq "$KEYWORD_REGEX"; then

              MATCH_COUNT=$((MATCH_COUNT + 1))

              {
                echo "Commit: ${SHORT_SHA}"
                echo "Subject: ${SUBJECT}"
                echo "Author: ${AUTHOR}"
                echo "Date: ${COMMIT_DATE}"
                echo "URL: https://github.com/${UPSTREAM_REPOSITORY}/commit/${COMMIT_SHA}"
                echo
              } >> "$MATCH_FILE"
            fi
          done < <(
            git rev-list \
              --reverse \
              "${BASE_SHA}..${UPSTREAM_REF}" \
              -- "$TRACKED_FILE"
          )

          echo "checked_count=$CHECKED_COUNT" >> "$GITHUB_OUTPUT"
          echo "match_count=$MATCH_COUNT" >> "$GITHUB_OUTPUT"
          echo "match_file=$MATCH_FILE" >> "$GITHUB_OUTPUT"

          if [ "$MATCH_COUNT" -gt 0 ]; then
            echo "matched=true" >> "$GITHUB_OUTPUT"

            echo
            echo "Found ${MATCH_COUNT} matching commit(s):"
            cat "$MATCH_FILE"
          else
            echo "matched=false" >> "$GITHUB_OUTPUT"

            echo
            echo "No matching commits were found."
          fi

      - name: Add matching commits to workflow summary
        if: steps.detect.outputs.matched == 'true'
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## New ransomware gang commit detected"
            echo
            echo "**Upstream repository:** [${UPSTREAM_REPOSITORY}](https://github.com/${UPSTREAM_REPOSITORY})"
            echo
            echo "**Tracked file:** \`${TRACKED_FILE}\`"
            echo
            echo "**Relevant commits checked:** ${{ steps.detect.outputs.checked_count }}"
            echo
            echo "**Matching add/added/new commits:** ${{ steps.detect.outputs.match_count }}"
            echo
            echo '```text'
            cat "${{ steps.detect.outputs.match_file }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report when no matching commits are found
        if: steps.detect.outputs.matched != 'true'
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## No matching ransomware gang commits"
            echo
            echo "The workflow checked new upstream commits modifying:"
            echo
            echo "\`${TRACKED_FILE}\`"
            echo
            echo "No commit met both conditions:"
            echo
            echo "1. The commit modified \`${TRACKED_FILE}\`."
            echo "2. The subject contained \`add\`, \`added\`, or \`new\`, regardless of capitalization."
            echo
            echo "**Relevant commits checked:** ${{ steps.detect.outputs.checked_count }}"
          } >> "$GITHUB_STEP_SUMMARY"

      # This step intentionally runs before synchronization.
      #
      # If Slack rejects the request, the workflow stops and the fork is not
      # synchronized. This allows the same upstream commits to be retried.
      - name: Send matching commits to Slack
        if: steps.detect.outputs.matched == 'true'
        env:
          # SLCK_HOOK is the name of your GitHub Actions repository secret.
          SLACK_WEBHOOK_URL: ${{ secrets.SLCK_HOOK }}
          MATCH_FILE: ${{ steps.detect.outputs.match_file }}
          MATCH_COUNT: ${{ steps.detect.outputs.match_count }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::error::The SLCK_HOOK repository secret is missing or empty."
            exit 1
          fi

          if [ ! -s "$MATCH_FILE" ]; then
            echo "::error::The matching-commit file is missing or empty."
            exit 1
          fi

          # Keep the Slack message at a manageable size.
          MATCH_DETAILS="$(head -c 2500 "$MATCH_FILE")"

          MESSAGE="$(
            printf '%s\n\n%s\n%s\n%s\n\n%s\n%s\n%s\n\n%s' \
              ':rotating_light: New ransomware gang commit detected' \
              "Upstream repository: https://github.com/${UPSTREAM_REPOSITORY}" \
              "Tracked file: ${TRACKED_FILE}" \
              "Matching add/added/new commits: ${MATCH_COUNT}" \
              'Commit details:' \
              "$MATCH_DETAILS" \
              "File history: https://github.com/${UPSTREAM_REPOSITORY}/commits/${UPSTREAM_BRANCH}/${TRACKED_FILE}" \
              'Treat the new ransomware group or leak-site claim as unverified until corroborated.'
          )"

          # The JSON key "text" must match the variable named "text" in your
          # Slack Workflow Builder webhook trigger.
          jq -n \
            --arg text "$MESSAGE" \
            '{text: $text}' \
            > "$RUNNER_TEMP/slack-payload.json"

          HTTP_STATUS="$(
            curl \
              --silent \
              --show-error \
              --output "$RUNNER_TEMP/slack-response.txt" \
              --write-out "%{http_code}" \
              --request POST \
              --header "Content-Type: application/json" \
              --data @"$RUNNER_TEMP/slack-payload.json" \
              "$SLACK_WEBHOOK_URL"
          )"

          SLACK_RESPONSE="$(
            cat "$RUNNER_TEMP/slack-response.txt"
          )"

          # Slack Workflow Builder webhooks may not return the literal word
          # "ok". Any HTTP response in the 200-299 range is accepted.
          case "$HTTP_STATUS" in
            2??)
              echo "Slack accepted the workflow webhook request."
              ;;
            *)
              echo "::error::Slack returned HTTP ${HTTP_STATUS}: ${SLACK_RESPONSE}"
              exit 1
              ;;
          esac

      # Synchronization happens only after Slack accepts any required alert.
      - name: Synchronize upstream into fork
        shell: bash
        run: |
          set -euo pipefail

          UPSTREAM_REF="upstream/${UPSTREAM_BRANCH}"

          # If the upstream tip is already in the fork's history, there is
          # nothing to synchronize.
          if git merge-base --is-ancestor "$UPSTREAM_REF" HEAD; then
            echo "The fork already contains the latest upstream commit."
            exit 0
          fi

          git config user.name "deepdarkCTI-monitor[bot]"
          git config user.email \
            "deepdarkCTI-monitor[bot]@users.noreply.github.com"

          git merge --no-edit "$UPSTREAM_REF"
          git push origin "HEAD:${FORK_BRANCH}"

          echo "Fork synchronized with ${UPSTREAM_REPOSITORY}."
