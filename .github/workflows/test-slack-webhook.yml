name: Test Slack workflow webhook

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Send test data to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLCK_HOOK }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::error::The SLCK_HOOK secret is missing or empty."
            exit 1
          fi

          jq -n \
            --arg text "deepdarkCTI webhook test successful. This channel will receive ransomware-gang monitoring alerts." \
            '{text: $text}' \
            > "$RUNNER_TEMP/slack-test.json"

          HTTP_STATUS="$(
            curl \
              --silent \
              --show-error \
              --output "$RUNNER_TEMP/slack-response.txt" \
              --write-out "%{http_code}" \
              --request POST \
              --header "Content-Type: application/json" \
              --data @"$RUNNER_TEMP/slack-test.json" \
              "$SLACK_WEBHOOK_URL"
          )"

          RESPONSE="$(cat "$RUNNER_TEMP/slack-response.txt")"

          case "$HTTP_STATUS" in
            2??)
              echo "Slack accepted the test request."
              ;;
            *)
              echo "::error::Slack returned HTTP ${HTTP_STATUS}: ${RESPONSE}"
              exit 1
              ;;
          esac
